<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <nav>
    <h1 class="logo">ReliefSOS</h1>
    <div class="menu" id="menu">
      <a href="index.html">Home</a>
      <a href="feed.html">Feed</a>
      <a href="map.html">Map</a>
    </div>
    <button id="toggle">☰</button>
  </nav>
</header>

<section class="page">

  <h2>Admin Dashboard</h2>

  <div class="stats">
    <div class="stat-box">
      <h3 class="sos-color" id="sosCount">0</h3>
      <p>SOS Requests</p>
    </div>
    <div class="stat-box">
      <h3 class="res-color" id="resCount">0</h3>
      <p>Resources</p>
    </div>
    <div class="stat-box">
      <h3 class="total-color" id="totalCount">0</h3>
      <p>Total Posts</p>
    </div>
  </div>

  <canvas id="chart"></canvas>

  <div class="filters">
    <button class="active" onclick="filterPosts('all', this)">All</button>
    <button onclick="filterPosts('SOS', this)">SOS</button>
    <button onclick="filterPosts('RESOURCE', this)">Resources</button>
  </div>

  <button class="clear-all" onclick="clearAll()">Clear All</button>

  <div id="postsList"></div>

</section>


<script src="js/app.js"></script>
<script src="js/admin.js"></script>


</body>
</html>
