<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Command Radar | ReliefSOS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

  <link rel="stylesheet" href="css/style.css">

  <style>
    body, html { height: 100%; margin: 0; overflow: hidden; background: #e2e8f0; }
    header { background: linear-gradient(to bottom, rgba(9, 9, 11, 0.95), transparent); position: absolute; z-index: 2000; width: 100%; }
    #map { height: 100vh; width: 100vw; z-index: 1; }
    
    .custom-pin { background: transparent; border: none; }
    
    .map-sidebar {
      position: absolute; top: 6rem; left: 1.5rem; width: 320px; z-index: 1000;
      display: flex; flex-direction: column; gap: 1rem; pointer-events: none;
    }

    .widget-card {
      background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(12px); border: 1px solid #3f3f46;
      border-radius: 16px; padding: 1.5rem; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      pointer-events: auto; transition: transform 0.3s ease;
    }

    .widget-card h3 { 
      font-size: 0.9rem; color: #a1a1aa; text-transform: uppercase; 
      letter-spacing: 1px; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
    }

    .weather-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; font-weight: 600; font-size: 1.1rem; }
    .weather-row i { color: #3b82f6; width: 25px; font-size: 1.2rem; }
    .hazard-warning { background: rgba(225, 29, 72, 0.1); color: #e11d48; padding: 10px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; margin-top: 10px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(225, 29, 72, 0.3); }

    #routeStatus { font-size: 0.95rem; color: #e2e8f0; line-height: 1.5; }
    .btn-clear-route { width: 100%; padding: 10px; margin-top: 10px; background: #3f3f46; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: none; }
    .btn-clear-route:hover { background: #e11d48; }

    .leaflet-routing-container { display: none !important; } 
    .leaflet-control-geocoder { border-radius: 8px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" style="text-decoration: none;"><h1 class="logo">Relief<span>SOS</span></h1></a>
    <nav class="menu" id="menu">
      <a href="index.html">Home</a><a href="needhelp.html">Request Help</a><a href="help.html">Volunteer</a>
      <a href="feed.html">Live Feed</a><a href="map.html" style="color: #3b82f6;">Radar Map</a><a href="admin.html">Admin</a>
    </nav>
  </header>

  <div id="map"></div>

  <div class="map-sidebar">
    
    <div class="widget-card" id="weatherWidget">
      <h3><i class="fa-solid fa-cloud-sun-rain" style="color: #3b82f6;"></i> Local Conditions API</h3>
      <div id="weatherContent">
        <p style="color: #a1a1aa; font-size: 0.9rem;">Acquiring GPS Lock...</p>
      </div>
    </div>

    <div class="widget-card" id="routingWidget">
      <h3><i class="fa-solid fa-truck-fast" style="color: #10b981;"></i> Supply & Transit Logistics</h3>
      <div id="routeStatus">
        <p style="color: #a1a1aa;">Click on any SOS or Resource pin on the map to plot a safe delivery or transit route.</p>
      </div>
      <button class="btn-clear-route" id="clearRouteBtn" onclick="clearCurrentRoute()"><i class="fa-solid fa-xmark"></i> Clear Active Route</button>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
  
  <script src="js/map.js"></script>

</body>
</html>
