<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SOS</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

  <nav>

    <h1>ReliefSOS</h1>

    <div class="menu" id="menu">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sos.html">SOS</a>
      <a href="feed.html">Feed</a>
      <a href="map.html">Map</a>
      <a href="admin.html">Admin</a>
    </div>

    <button id="toggle">☰</button>

  </nav>

</header>

<section class="help-section">

  <div class="help-card need-help">

    <h2>I Need Help</h2>

    <p class="section-text">
      Submit an emergency request so nearby volunteers can assist you quickly.
    </p>

    <form id="sosForm">

      <input 
      type="text" 
      id="name" 
      placeholder="Your Name" 
      required>

      <input 
      type="text" id="emergency" placeholder="Emergency Type" required>

      <input 
      type="text" 
      id="location" 
      placeholder="Current Location" 
      required>

      <input 
      type="text" 
      id="contact" 
      placeholder="Phone Number" 
      required>

      <button type="submit" class="danger-btn">
        Submit SOS Request
      </button>

    </form>

  </div>

  <div class="help-card offer-help">

    <h2>I Will Help</h2>

    <p class="section-text">
      Offer resources or volunteer support to help affected people nearby.
    </p>

    <form id="resourceForm">

      <input 
      type="text" 
      id="helper" 
      placeholder="Volunteer Name" 
      required>

      <input 
      type="text" 
      id="resource" 
      placeholder="Resource Type" 
      required>

      <input 
      type="text" 
      id="quantity" 
      placeholder="Available Quantity" 
      required>

      <button type="submit" class="safe-btn">
        Offer Resources
      </button>

    </form>

  </div>

</section>

<script src="js/app.js"></script>
<script src="js/storage.js"></script>

</body>
</html>
