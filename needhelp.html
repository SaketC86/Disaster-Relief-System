<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Help | ReliefSOS</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  
  <link rel="stylesheet" href="css/style.css">

  <style>
    .form-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 8rem 5% 4rem; background: url('https://images.unsplash.com/photo-1516132006923-cafc330e1596?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat; position: relative; }
    .form-section::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(9, 9, 11, 0.85); }
    .form-card { background-color: rgba(24, 24, 27, 0.95) !important; border: 1px solid #3f3f46 !important; border-radius: 16px; padding: 3rem; position: relative; z-index: 10; width: 100%; max-width: 550px; box-shadow: 0 20px 40px rgba(0,0,0,0.8) !important; }
    .form-card h2 { color: #ffffff !important; }
    .form-card p { color: #a1a1aa !important; margin-bottom: 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { color: #e2e8f0 !important; font-size: 0.95rem; margin-bottom: 0.5rem; display: block; font-weight: 600; }
    .input-group input, .input-group select { width: 100%; padding: 1rem; background-color: #27272a !important; color: #ffffff !important; border: 2px solid #52525b !important; border-radius: 8px; font-size: 1rem; outline: none; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
    .input-group input::placeholder { color: #a1a1aa !important; }
    .input-group input:focus, .input-group select:focus { border-color: var(--primary) !important; background-color: #3f3f46 !important; box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.2) !important; }
    #formMap { height: 220px; width: 100%; border-radius: 8px; border: 2px solid #52525b !important; margin-bottom: 1rem; z-index: 1; background: #e2e8f0; }
    .custom-pin { background: transparent; border: none; }
    .leaflet-control-geocoder { background: #27272a !important; border: 1px solid #52525b !important; color: #fff !important; border-radius: 8px !important; }
    .leaflet-control-geocoder-form input { background: transparent !important; color: #fff !important; }
    .leaflet-control-geocoder-icon { filter: invert(1); opacity: 0.8; }
    .leaflet-control-geocoder-alternatives { background: #27272a !important; border: 1px solid #52525b !important; }
    .leaflet-control-geocoder-alternatives li { color: #a1a1aa !important; }
    .leaflet-control-geocoder-alternatives li:hover { background: rgba(255,255,255,0.1) !important; color: #fff !important; }
    .submit-btn { width: 100%; padding: 1rem; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: background 0.3s; }
    .submit-btn:hover { background: var(--primary-hover); }
  </style>
</head>
<body>

  <header>
    <a href="index.html" style="text-decoration: none;"><h1 class="logo">Relief<span>SOS</span></h1></a>
    <nav class="menu" id="menu">
      <a href="index.html">Home</a><a href="needhelp.html" style="color: var(--primary);">Request Help</a><a href="help.html">Offer Supplies</a>

      <a href="feed.html">Live Feed</a><a href="map.html">Radar Map</a><a href="admin.html">Admin</a>
    </nav>
  </header>

  <section class="form-section">
    <div class="form-card">
      <h2>🚨 Emergency SOS</h2>
      <p>Submit your details. Nearby volunteers will be alerted immediately.</p>
      
      <form id="sosForm">
        <div class="input-group"><input type="text" id="name" placeholder="Full Name" required></div>
        
        <div class="input-group">
          <select id="emergency" required>
            <option value="" disabled selected>Select Request Type</option>
            <option value="Need Volunteer / Manpower">Need Volunteer / Manpower</option>
            <option value="Medical Emergency">Medical Emergency</option>
            <option value="Flood Rescue">Flood Rescue</option>
            <option value="Need Supplies">Need Supplies</option>
          </select>
        </div>

        <div class="input-group"><input type="tel" id="contact" placeholder="Phone Number" required></div>

        <div class="input-group">
          <label>Pinpoint Exact Location</label>
          <div id="formMap"></div>
          <div style="display: flex; gap: 0.5rem;">
            <input type="text" id="location" placeholder="Type address, or use map/GPS" required style="flex: 1;">
            <button type="button" id="gpsBtn" style="padding: 0 1.2rem; border-radius: 8px; border: 2px solid #52525b !important; background: #27272a !important; color: #fff !important; cursor: pointer; transition: 0.3s;" title="Auto-Locate Me">
              <i class="fa-solid fa-location-crosshairs"></i>
            </button>
          </div>
        </div>

        <input type="hidden" id="lat"><input type="hidden" id="lng">
        <button type="submit" class="submit-btn" style="margin-top: 1rem;">Broadcast Request</button>
      </form>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="js/storage.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const formMap = L.map('formMap').setView([9.09, 76.53], 12);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO', maxZoom: 19 }).addTo(formMap);
      setTimeout(() => { formMap.invalidateSize(); }, 300);

      const pinIcon = L.divIcon({ className: 'custom-pin', html: '<i class="fa-solid fa-location-dot" style="color: #e11d48; font-size: 38px; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5)); text-shadow: 0px 0px 2px #fff;"></i>', iconSize: [38, 38], iconAnchor: [15, 38] });
      let marker = L.marker([9.09, 76.53], { icon: pinIcon, draggable: true }).addTo(formMap);

      marker.on('dragend', function() { updateLocationData(marker.getLatLng().lat, marker.getLatLng().lng, "📍 Custom Map Pin Selected"); });
      formMap.on('click', function(e) { marker.setLatLng(e.latlng); updateLocationData(e.latlng.lat, e.latlng.lng, "📍 Custom Map Pin Selected"); });

      L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Search city..." }).on('markgeocode', function(e) { formMap.fitBounds(e.geocode.bbox); marker.setLatLng(e.geocode.center); updateLocationData(e.geocode.center.lat, e.geocode.center.lng, e.geocode.name); }).addTo(formMap);

      document.getElementById('gpsBtn').addEventListener('click', () => { document.getElementById('gpsBtn').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; formMap.locate({setView: true, maxZoom: 15}); });
      formMap.on('locationfound', function(e) { marker.setLatLng(e.latlng); updateLocationData(e.latlng.lat, e.latlng.lng, "📍 Exact GPS Confirmed"); document.getElementById('gpsBtn').innerHTML = '<i class="fa-solid fa-check" style="color: #10b981;"></i>'; });
      function updateLocationData(lat, lng, text) { document.getElementById('lat').value = lat; document.getElementById('lng').value = lng; document.getElementById('location').value = text; }
    });
  </script>
</body>
</html>
